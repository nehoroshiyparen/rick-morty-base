services:
  backend:
    build: ./backend
    ports:
      - "${APP_PORT:-7812}:${APP_PORT:-7812}"
    env_file:
      - ./backend/.env
    volumes:
      - ./backend/data:/app/data

  frontend:
    build: ./frontend
    ports:
      - "${FRONTEND_PORT:-5173}:${FRONTEND_PORT:-5173}"
    env_file:
      - ./frontend/.env
